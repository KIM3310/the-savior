name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run runtime checks
        run: npm run check

      - name: Run tests
        run: npm test

